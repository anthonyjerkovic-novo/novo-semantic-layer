cubes:
  - name: lifetime_values
    sql_table: "DEV_DB.DEV_ANWAR.FACT_GTM_ACQUISITION_COST"
    public: false

    joins:
      - name: businesses
        sql: "{CUBE}.business_id = {businesses}.business_id"
        relationship: many_to_one

    dimensions:

      - name: lifetime_values_surrogate_key
        sql: "SHA2(concat(CAST({CUBE}.statement_date AS VARCHAR), {CUBE}.business_id))"
        type: string
        title: Lifetime Values Surrogate Key
        description: Surrogate key generated by applying SHA2 hash to the concatenation of statement_date (as string) and business_id
        primary_key: true

      - name: business_id
        sql: "{CUBE}.business_id"
        type: string
        title: Business ID
        description: Unique identifier for the business

    measures:
      - name: contribution_ltv_m1
        sql: "{CUBE}.contribution_ltv_m1"
        type: sum
        title: M1 Lifetime Value (M1 LTV) ($)
        description: Calculated with at least 30 days of historical data, the net present value of future of all future cashlows for the lifetime (99 statement) of a Novo account

      - name: contribution_ltv_m3
        sql: "{CUBE}.contribution_ltv_m3"
        type: sum
        title: M3 Lifetime Value (M3 LTV) ($)
        description: Calculated with at least 90 days of historical data, the net present value of future of all future cashlows for the lifetime (99 statement) of a Novo account

    pre_aggregations:
      # Pre-aggregation definitions can be added here for performance optimization
      # Learn more: https://cube.dev/docs/caching/pre-aggregations/getting-started
