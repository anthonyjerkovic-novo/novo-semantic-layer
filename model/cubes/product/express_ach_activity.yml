cubes:
  - name: express_ach_activity
    sql_table: "DEV_DB.DEV_ANWAR.FACT_EXPRESS_ACH_ACTIVITY"
    public: false

    joins:
      - name: businesses
        sql: "{CUBE}.business_id = {businesses}.business_id"
        relationship: many_to_one

    dimensions:
      - name: express_ach_business_month_id
        sql: "{CUBE}.express_ach_business_month_id"
        type: string
        primary_key: true
        title: Express ACH Business Month ID
        description: Unique identifier for the express ACH activity record

      - name: business_id
        sql: "{CUBE}.business_id"
        type: string
        title: Business ID
        description: Unique identifier for the business

      - name: transaction_month
        sql: "{CUBE}.transaction_month"
        type: time
        title: Transaction Month
        description: Reporting month for express ACH transactions

      - name: business_specific_ordinal
        sql: "{CUBE}.business_specific_ordinal"
        type: number
        title: Business Specific Ordinal
        description: Sequential number of express ACH transactions for each business

    measures:
      - name: express_ach_attach
        sql: "CASE WHEN {CUBE}.business_specific_ordinal = 1 THEN {CUBE}.business_id END"
        type: count_distinct
        title: Express ACH Attach (#)
        description: Count of distinct businesses that had their first express ACH transaction in a given time period.

      - name: express_ach_active
        sql: "{CUBE}.business_id"
        type: count_distinct
        title: Express ACH Active (#)
        description: Count of distinct businesses that had any express ACH transaction in a given time period.

    pre_aggregations:
      # Pre-aggregation definitions can be added here for performance optimization
      # Learn more: https://cube.dev/docs/caching/pre-aggregations/getting-started
