cubes:
  - name: gtm_acquisition_cost
    sql_table: "DEV_DB.DEV_ANWAR.FACT_GTM_ACQUISITION_COST"
    public: false

    joins:
      - name: applications
        sql: "{CUBE}.application_id = {applications}.application_id"
        relationship: one_to_one

    dimensions:
      - name: gtm_acquisition_cost_surrogate_key
        sql: "SHA2(concat(CAST({CUBE}.statement_date AS VARCHAR), {CUBE}.application_id))"
        type: string
        title: Statement Date + Application ID Surrogate Key
        description: Surrogate key generated by applying SHA2 hash to the concatenation of statement_date (as string) and application_id
        primary_key: true

      - name: application_id
        sql: "{CUBE}.application_id"
        type: string
        primary_key: true
        title: Application ID
        description: Unique identifier for the application

      # dimensions from applications cube
      - name: acquisition_channel
        sql: "{applications.acquisition_channel}"
        type: string

      - name: application_decision
        sql: "{applications.application_decision}"
        type: string

    measures:
      - name: cost_per_started_application
        sql: "{CUBE}.cost_per_started_application"
        type: sum
        title: Cost per Started Application ($)
        description: Total spend per started application in USD on paid advertising, inclusive of top of funnel, brand awareness, and direct response testing.

      - name: cost_per_opened_account
        sql: "{CUBE}.cost_per_opened_account"
        type: sum
        title: Cost per Opened Account ($)
        description: Total spend per opened account in USD on paid advertising, inclusive of top of funnel, brand awareness, and direct response testing.

    pre_aggregations:
      # Pre-aggregation definitions can be added here for performance optimization
      # Learn more: https://cube.dev/docs/caching/pre-aggregations/getting-started
